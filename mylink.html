<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艾特的OKC</title>
    <meta name="description" content="效率控 | 雷霆死忠球迷">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --card-bg: #fff;
            --text: #1d1d1f;
            --text-light: #86868b;
            --accent: #FF6B00;
            --border: #e8e8ed;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: "Inter", -apple-system, "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 100px 24px 60px;
        }

        /* ===== 头部 ===== */
        .header { text-align: center; margin-bottom: 56px; }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            margin-bottom: 24px;
            object-fit: cover;
        }

        h1 {
            font-family: "Noto Serif SC", "SimSun", serif;
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .bio {
            color: var(--text-light);
            font-size: 1.05rem;
            line-height: 1.8;
        }

        .bio .accent { color: var(--accent); font-weight: 500; }

        /* ===== 链接列表 ===== */
        .links { list-style: none; }

        .links li {
            margin-bottom: 14px;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
        }

        .links li:nth-child(1) { animation-delay: 0.10s; }
        .links li:nth-child(2) { animation-delay: 0.15s; }
        .links li:nth-child(3) { animation-delay: 0.20s; }
        .links li:nth-child(4) { animation-delay: 0.25s; }
        .links li:nth-child(5) { animation-delay: 0.30s; }

        @keyframes fadeIn { to { opacity: 1; } }

        .links a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            background: var(--card-bg);
            border-radius: 18px;
            text-decoration: none;
            color: var(--text);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .links a:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
        }

        .link-left { display: flex; align-items: center; gap: 14px; }
        .link-icon { font-size: 1.4rem; width: 28px; text-align: center; }
        .link-title { font-weight: 500; letter-spacing: 0.3px; }
        .link-desc {
            font-size: 0.85rem;
            color: var(--text-light);
            margin: 8px 0 0 42px;
            line-height: 1.4;
        }
        .link-arrow {
            color: #c7c7cc;
            font-size: 0.9rem;
            transition: color 0.2s;
            flex-shrink: 0;
        }
        .links a:hover .link-arrow { color: var(--accent); }

        /* ===== 两列布局 ===== */
        .links-2col { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 48px; margin-bottom: 8px; }
        .links-2col li { margin-bottom: 0; }
        .links-2col .link-desc { display: none; }
        .links-2col .link-icon svg { width: 22px; height: 22px; }

        /* ===== 页脚 ===== */
        .footer {
            text-align: center;
            padding: 36px 24px 48px;
            color: var(--text-light);
            font-size: 0.8rem;
        }
        .footer a { color: var(--text-light); text-decoration: none; }
        .footer a:hover { color: var(--text); }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .container { padding: 72px 18px 40px; }
            h1 { font-size: 1.6rem; }
            .links a { padding: 16px 18px; }
            .link-desc { display: none; }
            .links-2col { grid-template-columns: 1fr; gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ========== 头像 + 名字 + 简介 ========== -->
        <div class="header">
            <img src="微信图片_20260522105522_448_19.jpg" alt="头像" class="avatar" onerror="this.style.display='none'">
            <h1>艾特的OKC</h1>

                        <span class="link-title">Thunder OKC Road 2026</span>

        <ul class="links links-2col">
            <li>
                <a href="https://space.bilibili.com/330511381" target="_blank">
                    <div class="link-left">
                        <span class="link-icon"><svg viewBox="0 0 24 24" fill="#00A1D6"><path d="M17.8 4.5c.9 0 2.1.2 2.8.7.6.4 1 1 .8 1.7-.2.8-.8 1.3-1.5 1.5-.7.2-1.5.3-2.3.3H6.4c-.8 0-1.6-.1-2.3-.3-.7-.2-1.3-.7-1.5-1.5-.2-.7.2-1.3.8-1.7.7-.5 1.9-.7 2.8-.7h11.6zM4.9 9.5h14.2c1.1 0 2 .9 2 2v6c0 1.1-.9 2-2 2H4.9c-1.1 0-2-.9-2-2v-6c0-1.1.9-2 2-2zm2.5 2.5v5l5-2.5-5-2.5z"/></svg></span>
                        <span class="link-title">Bilibili</span>
                    </div>
                    <span class="link-arrow">→</span>
                </a>
            </li>
            <li>
                <a href="#" target="_blank">
                    <div class="link-left">
                        <span class="link-icon"><svg viewBox="0 0 24 24" fill="#FF0000"><path d="M23.5 6.2c-.3-1.1-1.1-2-2.2-2.3C19.4 3.3 12 3.3 12 3.3s-7.4 0-9.3.6C1.6 4.2.8 5.1.5 6.2 0 8.2 0 12 0 12s0 3.8.5 5.8c.3 1.1 1.1 2 2.2 2.3 1.9.6 9.3.6 9.3.6s7.4 0 9.3-.6c1.1-.3 1.9-1.2 2.2-2.3.5-2 .5-5.8.5-5.8s0-3.8-.5-5.8zM9.5 15.8V8.2L16 12l-6.5 3.8z"/></svg></span>
                        <span class="link-title">YouTube</span>
                    </div>

            </li>
        </ul>

    </div>

    <footer class="footer">
        <a href="#">&copy; 2026 艾特的OKC</a>
    </footer>

</body>
</html>
